services:
  mysql:
    image: mysql:8.4
    container_name: parqueando-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: parqueandodb
      MYSQL_USER: parqueando
      MYSQL_PASSWORD: parqueando
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
