<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="perfil-card">
    <div class="avatar-wrap">
      <ion-avatar class="avatar">
        <img *ngIf="perfil.fotoUrl; else sinFoto" [src]="perfil.fotoUrl" />
        <ng-template #sinFoto>
          <ion-icon name="person-circle-outline" class="icon-avatar"></ion-icon>
        </ng-template>
      </ion-avatar>

      <ion-button fill="solid" size="small" class="btn-foto" (click)="cambiarFoto()">
        <ion-icon name="camera-outline" slot="start"></ion-icon>
        Cambiar foto
      </ion-button>
    </div>

    <div class="info">
      <h2>{{ perfil.nombreCompleto }}</h2>

      <p class="line">
        <ion-icon name="mail-outline"></ion-icon>
        <span>{{ perfil.email }}</span>
      </p>

      <p class="line" *ngIf="perfil.telefono">
        <ion-icon name="call-outline"></ion-icon>
        <span>{{ perfil.telefono }}</span>
      </p>
    </div>
  </div>

  <ion-list inset="true">
    <ion-item button (click)="editarPerfil()">
      <ion-icon name="create-outline" slot="start"></ion-icon>
      <ion-label>Editar perfil</ion-label>
    </ion-item>

    <ion-item button (click)="cerrarSesion()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      <ion-label color="danger">Cerrar sesión</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
