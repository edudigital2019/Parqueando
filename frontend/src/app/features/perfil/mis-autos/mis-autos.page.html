<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-button (click)="irMapa()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Mis Autos</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="agregarAuto()">
        <ion-icon name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Estado vacío -->
  <div *ngIf="autos.length === 0" class="empty">
    <ion-icon name="car-outline"></ion-icon>
    <h3>No tienes autos registrados</h3>
    <ion-button expand="block" (click)="agregarAuto()">Agregar Auto</ion-button>
  </div>

  <!-- Lista con swipe actions -->
  <ion-list *ngIf="autos.length > 0">
    <ion-item-sliding *ngFor="let auto of autos">

      <ion-item button detail="false" (click)="editarAuto(auto)">
        <ion-avatar slot="start">
          <img [src]="auto.imagen || 'https://i.pravatar.cc/120?u=car'" />
        </ion-avatar>

        <ion-label>
          <h2>{{ auto.marca }} {{ auto.modelo }}</h2>
          <p><strong>{{ auto.placa }}</strong> • {{ auto.color || 'Sin color' }}</p>
        </ion-label>

        <ion-badge *ngIf="auto.principal" color="success" slot="end">Principal</ion-badge>
      </ion-item>

      <!-- Swipe izquierda: Editar -->
      <ion-item-options side="start">
        <ion-item-option color="primary" (click)="editarAuto(auto)">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

      <!-- Swipe derecha: Eliminar -->
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmarEliminar(auto)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

</ion-content>

<!-- Botón flotante agregar -->
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button (click)="agregarAuto()">
    <ion-icon name="add-outline"></ion-icon>
  </ion-fab-button>
</ion-fab>
